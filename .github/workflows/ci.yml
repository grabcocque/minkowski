name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Override .cargo/config.toml's target-cpu=native — CI runners have
  # varying CPU generations and SIGILL if the compiled code uses
  # instructions the runner doesn't support.
  RUSTFLAGS: ""

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: stable
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: stable
      - run: cargo test -p minkowski

  miri:
    name: Miri
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri, rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nightly
      - name: Miri subset (~92 tests targeting unsafe code)
        run: ci/run-miri-subset.sh
        env:
          MIRIFLAGS: "-Zmiri-tree-borrows"

  tsan:
    name: ThreadSanitizer
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nightly-tsan
      - name: TSan tests (skip par_for_each)
        run: cargo +nightly test -p minkowski --lib --tests -Z build-std --target x86_64-unknown-linux-gnu -- --skip par_for_each
        env:
          RUSTFLAGS: "-Z sanitizer=thread"
      - name: TSan par_for_each
        run: cargo +nightly test -p minkowski --lib --tests -Z build-std --target x86_64-unknown-linux-gnu par_for_each
        env:
          RUSTFLAGS: "-Z sanitizer=thread"

  loom:
    name: Loom
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: stable
      - name: Loom concurrency tests
        run: cargo test -p minkowski --lib --features loom -- loom_tests
        env:
          RUSTFLAGS: "--cfg loom"

  # Aggregator job — the single required status check for branch protection.
  # fmt and clippy run in parallel. test runs after both. Miri, TSan, Loom
  # run after test on every PR and push.
  ci-pass:
    name: CI
    needs: [fmt, clippy, test, miri, tsan, loom]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any dependency did not succeed
        run: |
          if [[ "${{ needs.fmt.result }}" != "success" ||
                "${{ needs.clippy.result }}" != "success" ||
                "${{ needs.test.result }}" != "success" ||
                "${{ needs.miri.result }}" != "success" ||
                "${{ needs.tsan.result }}" != "success" ||
                "${{ needs.loom.result }}" != "success" ]]; then
            echo "One or more CI jobs failed or were skipped."
            echo "  fmt:    ${{ needs.fmt.result }}"
            echo "  clippy: ${{ needs.clippy.result }}"
            echo "  test:   ${{ needs.test.result }}"
            echo "  miri:   ${{ needs.miri.result }}"
            echo "  tsan:   ${{ needs.tsan.result }}"
            echo "  loom:   ${{ needs.loom.result }}"
            exit 1
          fi
